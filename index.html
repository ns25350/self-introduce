<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ns25350 | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0f;
    color: white;
    overflow-x: hidden;
}

/* ===== ローダー ===== */
#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.loader-text {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 900;
    color: #00f0ff;
    animation: glitch 1s infinite;
}

.loader-bar {
    margin-top: 20px;
    width: 200px;
    height: 3px;
    background: #222;
    overflow: hidden;
}

.loader-bar span {
    display: block;
    height: 100%;
    width: 0;
    background: #00f0ff;
    animation: load 2s forwards;
}

@keyframes load {
    to { width: 100%; }
}

@keyframes glitch {
    0% { text-shadow: 2px 0 #00f0ff; }
    25% { text-shadow: -2px 0 #ff00ff; }
    50% { text-shadow: 2px 0 #00f0ff; }
    75% { text-shadow: -2px 0 #ff00ff; }
    100% { text-shadow: 2px 0 #00f0ff; }
}

/* ===== ナビ ===== */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #00f0ff44;
}

nav h1 {
    font-size: clamp(18px, 4vw, 24px);
    color: #00f0ff;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav a {
    text-decoration: none;
    color: white;
    font-size: 14px;
}

/* ===== ヒーロー ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 8%;
}

.hero h2 {
    font-size: clamp(36px, 10vw, 80px);
    font-weight: 900;
    line-height: 1.1;
}

.hero span {
    color: #00f0ff;
    text-shadow: 0 0 15px #00f0ff;
}

/* ===== セクション ===== */
.section {
    padding: 100px 8%;
}

.card {
    background: #111118;
    padding: 20px;
    border: 1px solid #00f0ff33;
    margin-bottom: 20px;
    transition: 0.3s;
}

.card:hover {
    border-color: #00f0ff;
    box-shadow: 0 0 15px #00f0ff55;
}

/* ===== フェード演出 ===== */
.hidden {
    opacity: 0;
    transform: translateY(20px);
}

.show {
    opacity: 1;
    transform: translateY(0);
    transition: 1s ease;
}

/* ===== スマホ専用調整 ===== */
@media (max-width: 768px) {

    nav ul {
        gap: 12px;
    }

    .hero {
        align-items: center;
        text-align: left;
    }

    .section {
        padding: 80px 6%;
    }

}
</style>
</head>
<body>

<div id="loader">
    <div class="loader-text">ns25350 SYSTEM</div>
    <div class="loader-bar"><span></span></div>
</div>

<nav class="hidden">
    <h1>ns25350</h1>
    <ul>
        <li><a href="#">ABOUT</a></li>
        <li><a href="#">WORKS</a></li>
        <li><a href="#">CONTACT</a></li>
    </ul>
</nav>

<section class="hero hidden">
    <h2>HELLO.<br>I'm <span>ns25350</span></h2>
</section>

<section class="section hidden">
    <div class="card">Cyber Style Responsive Portfolio.</div>
</section>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";

        document.querySelectorAll(".hidden").forEach((el, i) => {
            setTimeout(() => {
                el.classList.add("show");
            }, i * 200);
        });

    }, 2000);
});
</script>

</body>
</html>
