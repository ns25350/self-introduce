<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Introduce</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{
    font-family:'Orbitron',sans-serif;
    background:#0a0a0f;
    color:white;
    overflow-x:hidden;
    cursor:none;
}

/* ===== アンビーカラー ===== */
:root{
    --anby-blue:#00E5FF;
    --anby-yellow:#FFD803;
}

/* ===== 背景アニメ ===== */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
      radial-gradient(circle at 20% 30%, rgba(0,229,255,0.15), transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(255,216,3,0.12), transparent 60%);
    animation:bgMove 12s linear infinite alternate;
    z-index:-1;
}
@keyframes bgMove{
    from{transform:translate(0,0);}
    to{transform:translate(-8%, -8%);}
}

/* ===== Loader ===== */
#loader{
    position:fixed;
    width:100%;
    height:100vh;
    background:#0a0a0f;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}
.loader-text{
    font-size:clamp(24px,5vw,40px);
    font-weight:900;
    color:var(--anby-blue);
    animation:glitch 1s infinite;
}
.loader-bar{
    margin-top:20px;
    width:200px;height:3px;background:#222;overflow:hidden;
}
.loader-bar span{
    display:block;height:100%;width:0;background:var(--anby-yellow);
    animation:load 2s forwards;
}
@keyframes load{to{width:100%;}}
@keyframes glitch{
    0%{text-shadow:2px 0 var(--anby-blue);}
    25%{text-shadow:-2px 0 var(--anby-yellow);}
    50%{text-shadow:2px 0 var(--anby-blue);}
    75%{text-shadow:-2px 0 var(--anby-yellow);}
    100%{text-shadow:2px 0 var(--anby-blue);}
}

/* ===== Nav ===== */
nav{
    position:fixed;width:100%;top:0;left:0;
    padding:15px 6%;
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(10,10,15,0.6);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(0,229,255,0.3);
    transition:0.3s;
    z-index:1000;
}
nav.scrolled{
    background:#0a0a0f;
    border-bottom:1px solid var(--anby-blue);
}
nav h1{color:var(--anby-blue);}
nav ul{list-style:none;display:flex;gap:30px;}
nav a{text-decoration:none;color:white;font-size:14px;transition:0.3s;}
nav a:hover{color:var(--anby-yellow);}

/* ===== ハンバーガー ===== */
.menu-toggle{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
}
.menu-toggle span{
    width:25px;height:3px;background:var(--anby-blue);
}
@media(max-width:768px){
    nav ul{
        position:absolute;
        top:60px;right:0;
        background:#0a0a0f;
        flex-direction:column;
        width:200px;
        padding:20px;
        display:none;
    }
    nav ul.active{display:flex;}
    .menu-toggle{display:flex;}
}

/* ===== Hero ===== */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 8%;
}
.hero h2{
    font-size:clamp(36px,10vw,80px);
}
.hero span{
    color:var(--anby-blue);
    text-shadow:0 0 20px var(--anby-blue);
}

/* ===== Section ===== */
.section{padding:120px 8%;}
.section h3{
    font-size:clamp(24px,5vw,40px);
    margin-bottom:40px;
    color:var(--anby-blue);
    border-left:4px solid var(--anby-blue);
    padding-left:20px;
}

/* ===== Grid ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}
.card{
    background:#111118;
    padding:30px;
    border:1px solid rgba(0,229,255,0.3);
    transition:0.3s;
}
.card:hover{
    transform:translateY(-8px);
    border-color:var(--anby-yellow);
    box-shadow:0 0 25px rgba(255,216,3,0.6);
}

/* ===== Scroll Animation ===== */
.hidden{
    opacity:0;
    transform:translateY(30px);
    transition:1s ease;
}
.show{
    opacity:1;
    transform:translateY(0);
}

/* ===== Footer ===== */
footer{
    text-align:center;
    padding:40px;
    border-top:1px solid rgba(0,229,255,0.3);
    color:#888;
}

/* ===== Mouse Follower ===== */
.cursor{
    position:fixed;
    top:0;left:0;
    width:18px;height:18px;
    border-radius:50%;
    pointer-events:none;
    background:rgba(0,229,255,0.15);
    border:2px solid var(--anby-blue);
    box-shadow:0 0 15px var(--anby-blue);
    transform:translate(-50%,-50%);
    z-index:9999;
}
.cursor.active{
    border-color:var(--anby-yellow);
    box-shadow:0 0 25px var(--anby-yellow);
}
</style>
</head>
<body>

<div id="loader">
    <div class="loader-text">ANBY SYSTEM</div>
    <div class="loader-bar"><span></span></div>
</div>

<nav>
    <h1>ns25350</h1>
    <div class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <ul id="menu">
        <li><a href="#about">ABOUT</a></li>
        <li><a href="#works">WORKS</a></li>
        <li><a href="#contact">CONTACT</a></li>
    </ul>
</nav>

<section class="hero hidden">
    <h2>HELLO.<br>I'm <span>ns25350</span></h2>
</section>

<section class="section hidden" id="about">
    <h3>ABOUT</h3>
    <div class="card">Anby Inspired Cyber Portfolio.</div>
</section>

<section class="section hidden" id="works">
    <h3>WORKS</h3>
    <div class="grid">
        <div class="card">Project 01</div>
        <div class="card">Project 02</div>
        <div class="card">Project 03</div>
    </div>
</section>

<section class="section hidden" id="contact">
    <h3>CONTACT</h3>
    <div class="card">Email: ns25350@example.com</div>
</section>

<footer>
© 2026 ns25350 All Rights Reserved.
</footer>

<div class="cursor" id="cursor"></div>

<script>
/* Loader */
window.addEventListener("load",()=>{
    setTimeout(()=>{
        document.getElementById("loader").style.display="none";
        document.querySelectorAll(".hidden").forEach(el=>el.classList.add("show"));
    },2000);
});

/* Scroll Nav */
window.addEventListener("scroll",()=>{
    document.querySelector("nav").classList.toggle("scrolled",window.scrollY>50);
});

/* Mobile Menu */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

/* Mouse Follower */
const cursor=document.getElementById("cursor");
let mouseX=0,mouseY=0,currentX=0,currentY=0;

window.addEventListener("mousemove",e=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
});

function animate(){
    currentX+=(mouseX-currentX)*0.15;
    currentY+=(mouseY-currentY)*0.15;
    cursor.style.left=currentX+"px";
    cursor.style.top=currentY+"px";
    requestAnimationFrame(animate);
}
animate();

document.querySelectorAll("a,.card").forEach(el=>{
    el.addEventListener("mouseenter",()=>cursor.classList.add("active"));
    el.addEventListener("mouseleave",()=>cursor.classList.remove("active"));
});

/* スマホはカーソル無効 */
if(window.matchMedia("(max-width:768px)").matches){
    cursor.style.display="none";
    document.body.style.cursor="default";
}
</script>

</body>
</html>
